# Blueprint do Render — https://render.com/docs/blueprint-spec
# No painel do Render: New + → Blueprint → selecione este repositório.
services:
  - type: web
    name: yara
    runtime: node
    plan: free
    rootDir: Server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/status
    envVars:
      # Preencha os valores no painel do Render (Environment) — nunca no código
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
